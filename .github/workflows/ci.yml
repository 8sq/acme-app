name: Checks & Preview

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      STAGING_PROJECT_NAME: ygoma-staging
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Build
        working-directory: apps/web
        run: pnpm build:preview

      - name: Set branch slug
        id: branch
        run: |
          SLUG="${{ github.head_ref || github.ref_name }}"
          SLUG="${SLUG//\//-}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "db_name=ygoma-preprod" >> "$GITHUB_OUTPUT"
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "db_name=ygoma-preview-${SLUG}" >> "$GITHUB_OUTPUT"
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or get D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: d1
        run: |
          DB_NAME="${{ steps.branch.outputs.db_name }}"
          EXISTING=$(npx wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          if [ -n "$EXISTING" ]; then
            echo "db_id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            RESULT=$(npx wrangler d1 create "$DB_NAME" --json)
            echo "db_id=$(echo "$RESULT" | jq -r '.uuid')" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply D1 migrations
        if: steps.d1.outputs.db_id != ''
        working-directory: apps/web
        run: >-
          npx wrangler d1 migrations apply
          "${{ steps.branch.outputs.db_name }}"
          --remote

      - name: Set D1 binding in wrangler.toml
        if: steps.d1.outputs.db_id != ''
        working-directory: apps/web
        run: |
          DB_NAME="${{ steps.branch.outputs.db_name }}"
          DB_ID="${{ steps.d1.outputs.db_id }}"
          if [ "${{ steps.branch.outputs.is_main }}" = "true" ]; then
            sed -i "s/database_id = \"PREPROD_D1_ID\"/database_id = \"$DB_ID\"/" wrangler.toml
          else
            cat >> wrangler.toml <<EOF

          [env.preview]
          [[env.preview.d1_databases]]
          binding = "DB"
          database_name = "$DB_NAME"
          database_id = "$DB_ID"
          EOF
          fi

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/web
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ env.STAGING_PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL
        if: >-
          github.event_name == 'pull_request' &&
          steps.deploy.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-deployment
          message: >-
            **Preview deployment:**
            ${{ steps.deploy.outputs.pages-deployment-alias-url }}
